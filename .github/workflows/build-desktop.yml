name: Build Desktop Executables

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: GeneWalk-Windows
          - os: macos-latest
            artifact: GeneWalk-macOS
          - os: ubuntu-latest
            artifact: GeneWalk-Linux

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements-desktop.txt
          pip install pyinstaller

      - name: Build executable
        run: python build_desktop.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/GeneWalk/

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Zip artifacts for release
        run: |
          cd artifacts
          for dir in GeneWalk-Windows GeneWalk-macOS GeneWalk-Linux; do
            if [ -d "$dir" ]; then
              cd "$dir"
              zip -r "../${dir}.zip" .
              cd ..
            fi
          done
          ls -lh *.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/GeneWalk-Windows.zip
            artifacts/GeneWalk-macOS.zip
            artifacts/GeneWalk-Linux.zip
