name: Build Desktop Executables

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: GeneWalk-Windows
            zip_name: GeneWalk-Windows.zip
          - os: macos-latest
            artifact: GeneWalk-macOS
            zip_name: GeneWalk-macOS.zip
          - os: ubuntu-latest
            artifact: GeneWalk-Linux
            zip_name: GeneWalk-Linux.zip

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements-desktop.txt
          pip install pyinstaller

      - name: Build executable
        run: python build_desktop.py

      - name: Zip output directory
        shell: bash
        run: |
          cd dist
          if [ "$RUNNER_OS" == "Windows" ]; then
            7z a "../${{ matrix.zip_name }}" GeneWalk/
          else
            zip -r "../${{ matrix.zip_name }}" GeneWalk/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.zip_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/GeneWalk-Windows.zip
            artifacts/GeneWalk-macOS.zip
            artifacts/GeneWalk-Linux.zip
